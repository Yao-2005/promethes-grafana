version: '3.8'
networks:
  monitoring:
    external: true

services:
  blackbox-exporter:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/quay.io/prometheus/blackbox-exporter:v0.19.0
    container_name: blackbox-exporter
    networks:
      - monitoring
    ports:
      - "9115:9115"
    volumes:
      - ./config/blackbox.yml:/etc/blackbox_exporter/config.yml
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    restart: unless-stopped

